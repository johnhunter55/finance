<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>finance</title>
    <style>
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
    </style>
  </head>
  <body class="w-full h-screen bg-olive-900 text-olive-100 flex flex-col">
    <div class="flex justify-between items-center bg-olive-950/50">
      <h1 id="welcome-text" class="text-2xl pl-5"></h1>
      <button
        id="logout-btn"
        class="ml-auto bg-olive-800/50 p-2 px-6 m-2 rounded-2xl text-xl hover:bg-olive-800 hover:shadow-2xl cursor-pointer transition-all duration-200"
      >
        Logout
      </button>
    </div>
    <div class="p-3 flex gap-2">
      <a
        href="dashboard.html"
        class="bg-olive-800 p-2 px-6 rounded-2xl text-lg hover:bg-olive-700/50 hover:shadow-lg cursor-pointer transition-all duration-200"
        >Dashboard</a
      >
      <a
        href="transactions.html"
        class="bg-olive-800 p-2 px-6 rounded-2xl text-lg hover:bg-olive-700/50 hover:shadow-lg cursor-pointer transition-all duration-200"
        >Transactions</a
      >
    </div>
    <div id="transaction-list" class="flex flex-col mt-5"></div>
    <div
      id="doubleCheck"
      class="fixed inset-0 items-center justify-center bg-black/50 z-10 hidden"
    ></div>
    <script type="module" src="/src/history.js"></script>
  </body>
</html>
