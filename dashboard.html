<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>finance</title>
  </head>
  <body class="flex flex-col w-full h-screen bg-olive-900 text-olive-100">
    <header></header>
    <div class="flex-col flex h-full justify-start overflow-auto mt-5">
      <div class="flex flex-col justify-center items-center w-full">
        <div class="flex">
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <div
              class="shadow-2xl bg-olive-600 p-10 px-20 flex flex-col justify-evenly items-center rounded-2xl"
            >
              <h1 class="text-xl font-bold">Income</h1>
              <h2 id="income">$0</h2>
            </div>
            <div
              class="shadow-2xl bg-olive-600 p-10 px-20 flex flex-col justify-evenly items-center rounded-2xl"
            >
              <h1 class="text-xl font-bold">Expense</h1>
              <h2 id="expenses">$0</h2>
            </div>
            <div
              class="shadow-2xl bg-olive-600 p-10 px-20 flex flex-col justify-evenly items-center rounded-2xl"
            >
              <h1 class="text-xl font-bold">Balance</h1>
              <h2 id="balance">$0</h2>
            </div>
          </div>
        </div>

        <div id="expense-chart" class="w-full h-auto mt-15"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
