<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>finance</title>
  </head>
  <body class="w-full h-screen bg-olive-900 text-olive-100">
    <div class="flex justify-between items-center bg-olive-950/50">
      <h1 id="welcome-text" class="text-2xl pl-5"></h1>
      <button
        id="logout-btn"
        class="ml-auto bg-olive-800/50 p-2 px-6 m-2 rounded-2xl text-xl hover:bg-olive-800 hover:shadow-2xl cursor-pointer transition-all duration-200"
      >
        Logout
      </button>
    </div>
    <div class="p-3 flex gap-2">
      <a
        href="transactions.html"
        class="bg-olive-800 p-2 px-6 rounded-2xl text-lg hover:bg-olive-700/50 hover:shadow-lg cursor-pointer transition-all duration-200"
        >Transactions</a
      >
      <a
        href="history.html"
        class="bg-olive-800 p-2 px-6 rounded-2xl text-lg hover:bg-olive-700/50 hover:shadow-lg cursor-pointer transition-all duration-200"
        >History</a
      >
    </div>
    <div class="flex justify-center items-center w-full h-130">
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <div
          class="shadow-2xl bg-olive-600 p-12 px-20 flex flex-col justify-evenly items-center rounded-2xl"
        >
          <h1 class="text-xl font-bold">Income</h1>
          <h2 id="income">$0</h2>
        </div>
        <div
          class="shadow-2xl bg-olive-600 p-12 px-20 flex flex-col justify-evenly items-center rounded-2xl"
        >
          <h1 class="text-xl font-bold">Expense</h1>
          <h2 id="expenses">$0</h2>
        </div>
        <div
          class="shadow-2xl bg-olive-600 p-12 px-20 flex flex-col justify-evenly items-center rounded-2xl"
        >
          <h1 class="text-xl font-bold">Balance</h1>
          <h2 id="balance">$0</h2>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
