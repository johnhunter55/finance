<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>finance</title>
  </head>
  <body
    class="flex flex-col w-full h-screen bg-olive-900 text-olive-100 overflow-hidden"
  >
    <header></header>

    <main class="flex-1 overflow-y-auto">
      <div
        class="flex flex-col justify-center items-center min-h-full w-full py-10 px-4 sm:px-8"
      >
        <div class="w-full max-w-5xl">
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <div
              class="shadow-2xl bg-olive-600 p-6 sm:p-10 flex flex-col justify-center items-center rounded-2xl"
            >
              <h1 class="text-xl font-bold mb-2">Income</h1>
              <h2 id="income" class="text-2xl sm:text-3xl">$0.00</h2>
            </div>

            <div
              class="shadow-2xl bg-olive-600 p-6 sm:p-10 flex flex-col justify-center items-center rounded-2xl"
            >
              <h1 class="text-xl font-bold mb-2">Expense</h1>
              <h2 id="expenses" class="text-2xl sm:text-3xl">$0.00</h2>
            </div>

            <div
              class="shadow-2xl bg-olive-600 p-6 sm:p-10 flex flex-col justify-center items-center rounded-2xl"
            >
              <h1 class="text-xl font-bold mb-2">Balance</h1>
              <h2 id="balance" class="text-2xl sm:text-3xl">$0.00</h2>
            </div>
          </div>

          <div
            id="expense-chart"
            class="w-full h-80 sm:h-96 mt-12 bg-olive-800/30 rounded-3xl p-2 sm:p-6 shadow-xl"
          ></div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
